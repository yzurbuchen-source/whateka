<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Anna : lunettes, jupe, salue -->
  <ellipse cx="100" cy="232" rx="40" ry="4" fill="#000000" opacity="0.14"/>

  <!-- Jambes -->
  <rect x="78" y="150" width="18" height="68" rx="6" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.5"/>
  <rect x="104" y="150" width="18" height="68" rx="6" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.5"/>
  <!-- Bottines noires -->
  <ellipse cx="87" cy="222" rx="14" ry="6" fill="#1A1A1A"/>
  <ellipse cx="113" cy="222" rx="14" ry="6" fill="#1A1A1A"/>

  <!-- Bras gauche -->
  <rect x="48" y="76" width="16" height="80" rx="8" fill="#F6AE2D"/>
  <circle cx="56" cy="160" r="9" fill="#E8D4B8"/>

  <!-- Bras droit LEVE -->
  <g transform="rotate(-50 142 84)">
    <rect x="134" y="76" width="16" height="80" rx="8" fill="#F6AE2D"/>
    <circle cx="142" cy="160" r="11" fill="#E8D4B8"/>
    <circle cx="138" cy="155" r="2.5" fill="#D4B896"/>
    <circle cx="146" cy="155" r="2.5" fill="#D4B896"/>
  </g>

  <!-- T-shirt jaune -->
  <path d="M 60 80 Q 60 70 70 70 L 130 70 Q 140 70 140 80 L 140 130 Q 140 136 134 136 L 66 136 Q 60 136 60 130 Z"
        fill="#F6AE2D" stroke="#A87810" stroke-width="0.8"/>
  <!-- Jupe noire (en triangle vers le bas) -->
  <path d="M 56 130 L 144 130 L 148 152 Q 148 158 142 158 L 58 158 Q 52 158 52 152 Z"
        fill="#1A1A1A" stroke="#000000" stroke-width="0.8"/>

  <!-- Tete -->
  <circle cx="100" cy="44" r="32" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.8"/>
  <!-- Cheveux carre brun -->
  <path d="M 66 36 Q 64 12 100 10 Q 136 12 134 36 L 134 50 L 130 50 Q 130 30 100 24 Q 70 30 70 50 L 66 50 Z"
        fill="#3D2817" stroke="#1A0F08" stroke-width="0.5"/>
  <!-- Frange droite -->
  <path d="M 70 26 L 130 26 L 130 36 L 70 36 Z" fill="#3D2817"/>

  <!-- Cou -->
  <rect x="92" y="68" width="16" height="10" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.5"/>

  <!-- Lunettes rondes -->
  <circle cx="88" cy="42" r="6" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="112" cy="42" r="6" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="94" y1="42" x2="106" y2="42" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Yeux dans les lunettes -->
  <circle cx="88" cy="42" r="1.8" fill="#1A1A1A"/>
  <circle cx="112" cy="42" r="1.8" fill="#1A1A1A"/>
  <!-- Sourire -->
  <path d="M 88 56 Q 100 64 112 56" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="80" cy="54" rx="4" ry="2.5" fill="#FF8B7A" opacity="0.5"/>
  <ellipse cx="120" cy="54" rx="4" ry="2.5" fill="#FF8B7A" opacity="0.5"/>
</svg>
