<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Max : monsieur grisonnant, salue -->
  <ellipse cx="100" cy="232" rx="40" ry="4" fill="#000000" opacity="0.14"/>

  <!-- Jambes -->
  <rect x="78" y="150" width="18" height="68" rx="6" fill="#6B5A48"/>
  <rect x="104" y="150" width="18" height="68" rx="6" fill="#6B5A48"/>
  <!-- Mocassins marron -->
  <ellipse cx="87" cy="222" rx="14" ry="6" fill="#3D2817"/>
  <ellipse cx="113" cy="222" rx="14" ry="6" fill="#3D2817"/>

  <!-- Bras gauche -->
  <rect x="48" y="76" width="16" height="80" rx="8" fill="#FF6F61"/>
  <circle cx="56" cy="160" r="9" fill="#E8D4B8"/>

  <!-- Bras droit LEVE -->
  <g transform="rotate(-50 142 84)">
    <rect x="134" y="76" width="16" height="80" rx="8" fill="#FF6F61"/>
    <circle cx="142" cy="160" r="11" fill="#E8D4B8"/>
    <circle cx="138" cy="155" r="2.5" fill="#D4B896"/>
    <circle cx="146" cy="155" r="2.5" fill="#D4B896"/>
  </g>

  <!-- Pull orange -->
  <path d="M 60 80 Q 60 70 70 70 L 130 70 Q 140 70 140 80 L 140 152 Q 140 158 134 158 L 66 158 Q 60 158 60 152 Z"
        fill="#FF6F61" stroke="#C84030" stroke-width="0.8"/>
  <!-- Col en V (montrant un t-shirt blanc) -->
  <path d="M 90 70 L 100 84 L 110 70 Z" fill="#FFFFFF"/>

  <!-- Tete -->
  <circle cx="100" cy="44" r="32" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.8"/>
  <!-- Cheveux gris (sur les cotes seulement, sommet degarni) -->
  <path d="M 70 40 Q 68 22 78 18 Q 78 30 80 42 Z" fill="#A0A0A0" stroke="#707070" stroke-width="0.5"/>
  <path d="M 130 40 Q 132 22 122 18 Q 122 30 120 42 Z" fill="#A0A0A0" stroke="#707070" stroke-width="0.5"/>
  <path d="M 78 18 Q 100 14 122 18 L 122 26 Q 100 22 78 26 Z" fill="#A0A0A0" stroke="#707070" stroke-width="0.5"/>

  <!-- Cou -->
  <rect x="92" y="68" width="16" height="10" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.5"/>

  <!-- Yeux -->
  <ellipse cx="88" cy="42" rx="3" ry="3.5" fill="#FFFFFF"/>
  <ellipse cx="112" cy="42" rx="3" ry="3.5" fill="#FFFFFF"/>
  <circle cx="88" cy="42" r="1.8" fill="#1A1A1A"/>
  <circle cx="112" cy="42" r="1.8" fill="#1A1A1A"/>
  <!-- Sourcils gris -->
  <path d="M 82 36 Q 88 33 94 36" stroke="#707070" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 106 36 Q 112 33 118 36" stroke="#707070" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Barbe grise -->
  <path d="M 76 60 Q 78 76 100 78 Q 122 76 124 60 Q 100 70 76 60 Z" fill="#A0A0A0" stroke="#707070" stroke-width="0.5" opacity="0.85"/>
  <!-- Moustache -->
  <path d="M 86 56 Q 100 60 114 56 L 110 60 Q 100 62 90 60 Z" fill="#A0A0A0" stroke="#707070" stroke-width="0.4"/>
  <!-- Sourire (visible dans la barbe) -->
  <path d="M 92 64 Q 100 67 108 64" stroke="#1A1A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
