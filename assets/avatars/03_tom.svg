<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Tom : casquette rouge, short, salue -->
  <ellipse cx="100" cy="232" rx="40" ry="4" fill="#000000" opacity="0.14"/>

  <!-- Jambes nues (short) -->
  <rect x="78" y="150" width="18" height="68" rx="6" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.5"/>
  <rect x="104" y="150" width="18" height="68" rx="6" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.5"/>
  <!-- Chaussures de sport -->
  <ellipse cx="87" cy="222" rx="14" ry="6" fill="#5C4A3A" stroke="#3D2817" stroke-width="0.5"/>
  <ellipse cx="113" cy="222" rx="14" ry="6" fill="#5C4A3A" stroke="#3D2817" stroke-width="0.5"/>

  <!-- Bras gauche (le long du corps, peau visible) -->
  <rect x="48" y="76" width="16" height="80" rx="8" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.4"/>
  <circle cx="56" cy="160" r="9" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.4"/>

  <!-- Bras droit LEVE -->
  <g transform="rotate(-50 142 84)">
    <rect x="134" y="76" width="16" height="80" rx="8" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.4"/>
    <circle cx="142" cy="160" r="11" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.4"/>
    <circle cx="138" cy="155" r="2.5" fill="#D4B896"/>
    <circle cx="146" cy="155" r="2.5" fill="#D4B896"/>
  </g>

  <!-- T-shirt vert -->
  <path d="M 60 80 Q 60 70 70 70 L 130 70 Q 140 70 140 80 L 140 130 Q 140 136 134 136 L 66 136 Q 60 136 60 130 Z"
        fill="#5A7F6F" stroke="#3D5C4A" stroke-width="0.8"/>
  <!-- Short kaki -->
  <path d="M 60 130 L 140 130 L 140 152 Q 140 158 134 158 L 66 158 Q 60 158 60 152 Z"
        fill="#6B7A55" stroke="#4A5A38" stroke-width="0.8"/>

  <!-- Tete -->
  <circle cx="100" cy="44" r="32" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.8"/>
  <!-- Cheveux courts -->
  <path d="M 70 38 Q 70 18 100 16 Q 130 18 130 38 L 128 32 Q 100 26 72 32 Z"
        fill="#5C4A3A" stroke="#3D2817" stroke-width="0.5"/>
  <!-- Casquette rouge avec visiere -->
  <path d="M 68 26 Q 68 10 100 8 Q 132 10 132 26 L 132 30 Q 100 22 68 30 Z"
        fill="#D83034" stroke="#8B1A1A" stroke-width="0.6"/>
  <!-- Visiere -->
  <ellipse cx="100" cy="30" rx="32" ry="3" fill="#8B1A1A"/>

  <!-- Cou -->
  <rect x="92" y="68" width="16" height="10" fill="#E8D4B8" stroke="#D4B896" stroke-width="0.5"/>

  <!-- Yeux -->
  <ellipse cx="88" cy="42" rx="3" ry="3.5" fill="#FFFFFF"/>
  <ellipse cx="112" cy="42" rx="3" ry="3.5" fill="#FFFFFF"/>
  <circle cx="88" cy="42" r="1.8" fill="#1A1A1A"/>
  <circle cx="112" cy="42" r="1.8" fill="#1A1A1A"/>
  <!-- Sourire -->
  <path d="M 88 56 Q 100 64 112 56" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="80" cy="52" rx="4" ry="2.5" fill="#FF8B7A" opacity="0.5"/>
  <ellipse cx="120" cy="52" rx="4" ry="2.5" fill="#FF8B7A" opacity="0.5"/>
</svg>
